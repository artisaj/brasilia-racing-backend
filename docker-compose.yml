services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brasilia-racing-backend-app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - db

  nginx:
    image: nginx:1.27-alpine
    container_name: brasilia-racing-backend-nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    container_name: brasilia-racing-postgres
    environment:
      POSTGRES_DB: brasilia_racing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
    name: brasilia-racing-postgres-data
